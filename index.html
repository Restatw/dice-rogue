<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#12121c" />
    <title>骰途 Dice Rogue</title>
    <style>
      /* Zpix 最像素：繁體中文像素字型（OFL），8-bit 風格且清楚易讀 */
      @font-face {
        font-family: 'Zpix';
        src: url('/fonts/zpix.woff2') format('woff2');
        font-display: block;
      }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #12121c; overflow: hidden; }
      /* #game 的實際尺寸由 main.js 依 visualViewport 動態鎖定（解決手機網址列造成的頂部裁切） */
      #game { position: fixed; top: 0; left: 0; }
      canvas { image-rendering: pixelated; display: block; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
